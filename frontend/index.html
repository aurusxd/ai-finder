<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>AI Finder</title>
</head>
<body>
    
    <div class="chat-window">
        <aside class="sidebar">
            <div class="sidebar-top">
                <a class="sidebar-logo" href="#" aria-label="AI Finder">
                    <span class="sidebar-logo-icon">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                            <rect x="4" y="7" width="16" height="12" rx="3" stroke="currentColor" stroke-width="1.8"/>
                            <circle cx="9" cy="13" r="1.5" fill="currentColor"/>
                            <circle cx="15" cy="13" r="1.5" fill="currentColor"/>
                            <path d="M12 7V4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                            <circle cx="12" cy="3" r="1.2" fill="currentColor"/>
                        </svg>
                    </span>
                    <span class="sidebar-logo-text">AI Finder</span>
                </a>
                <button class="new-chat-btn" id="newChatBtn">
                    <i class="fas fa-plus"></i> + Новый чат
                </button>
            </div>

          <div class="sidebar-bottom">
    <div class="profile-card">
        <div class="profile-avatar">
            <i class="fas fa-user" style="color: white; font-size: 16px;"></i>
        </div>
        <div class="profile-info">
            <span class="profile-name" id="profileName"></span>
            <span class="profile-email" id="profileEmail"></span>
        </div>
        <div class="profile-menu-wrapper">
            <button class="profile-menu-btn" id="profileMenuBtn" title="Меню">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <circle cx="12" cy="5" r="2.5"/>
                    <circle cx="12" cy="12" r="2.5"/>
                    <circle cx="12" cy="19" r="2.5"/>
                </svg>
            </button>
            
            <div class="profile-dropdown" id="profileDropdown">
                <button class="dropdown-item" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i> Выйти
                </button>
            </div>
        </div>
    </div>
</div>
        </aside>

        <main class="main-chat">
            <div class="chat-header">
                <h2><i class="fas fa-comment-dots" style="margin-right: 10px; color: #1a73e8;"></i>Новый чат</h2>
                <i class="fas fa-ellipsis-h"></i>
            </div>

            
            <div class="start-screen" id="startScreen">
                <div class="start-content">
                    <div class="logo">
                        <i class="fas fa-robot"></i>
                    </div>
                    <h1>Начните диалог</h1>
                    <p class="subtitle">Загрузите ваш документ и задайте вопрос</p>
                    <div class="start-input-wrapper">
                        <input type="text" id="startInput" placeholder="Введите запрос..." />
                        <div class="start-actions">
                            <button class="attach-btn" id="startAttachBtn" title="Прикрепить документ">
                                +
                            </button>
                            <button class="send-btn" id="startSendBtn">
                                ⮞
                            </button>
                        </div>
                    </div>
                </div>
            </div>

           
            <div class="messages-area hidden" id="messagesArea"></div>

            
            <div class="input-area" id="chatInputArea">
                <div class="input-wrapper">
                    <input type="text" id="chatInput" placeholder="Введите сообщение..." />
                    <div class="input-actions">
                        <button class="attach-btn" id="attachBtn" title="Прикрепить документ">
                            +
                        </button>
                        <button class="send-btn" id="chatSendBtn">
                            ⮞
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

  <script src="auth.js"></script>
  <script src="script2.js"></script>
</body>
</html>
